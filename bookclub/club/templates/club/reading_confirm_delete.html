{% extends "club/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white"><h4 class="mb-0">Confirm Delete</h4></div>
      <div class="card-body">
        <p>Are you sure you want to delete this reading?</p>
        <p><strong>{{ reading.member }}</strong> — {{ reading.book.title }}</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'reading_list' %}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
